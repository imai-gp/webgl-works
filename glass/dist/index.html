<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Blob</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #bg-text {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(80px, 22vw, 400px);
      line-height: 0.88;
      color: #DFE5E2;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      text-align: center;
      user-select: none;
    }

    .meta {
      position: fixed;
      top: 24px;
      right: 20px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 10px;
      color: #DFE5E2;
      letter-spacing: 0.12em;
      line-height: 1.8;
      text-align: right;
      user-select: none;
      z-index: 1;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .meta:hover { opacity: 0.65; }

    #fps {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.30);
      letter-spacing: 0.08em;
      user-select: none;
      z-index: 1;
    }

    .meta-left {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 10px;
      color: #DFE5E2;
      letter-spacing: 0.12em;
      line-height: 1.8;
      user-select: none;
      z-index: 1;
    }

    #webgl {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      pointer-events: none;
    }

    /* ── パラメーターパネル ───────────────────────────── */
    #panel {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(12, 12, 16, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 10px;
      padding: 16px 18px;
      min-width: 220px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-family: 'Poppins', sans-serif;
      color: rgba(255, 255, 255, 0.55);
      font-size: 11px;
      letter-spacing: 0.05em;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    #panel.hidden {
      opacity: 0;
      transform: translateY(-8px) scale(0.97);
      pointer-events: none;
    }

    #panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      cursor: pointer;
    }
    #panel-head h3 {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.30);
      text-transform: uppercase;
    }
    #panel-toggle-btn {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.30);
      line-height: 1;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
    }

    .param-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 11px;
    }
    .param-row:last-child { margin-bottom: 0; }

    .param-label {
      flex: 0 0 80px;
      white-space: nowrap;
      color: rgba(255, 255, 255, 0.60);
    }

    /* ── i ボタン ────────────────────────────────── */
    .info-btn {
      flex: 0 0 auto;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: transparent;
      color: rgba(255, 255, 255, 0.30);
      font-family: 'Poppins', sans-serif;
      font-size: 8px;
      font-weight: 700;
      font-style: italic;
      cursor: default;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: border-color 0.18s, color 0.18s;
      user-select: none;
    }
    .info-btn:hover {
      border-color: rgba(255, 255, 255, 0.55);
      color: rgba(255, 255, 255, 0.70);
    }

    .param-val {
      flex: 0 0 36px;
      text-align: right;
      color: rgba(255, 255, 255, 0.90);
      font-weight: 700;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      cursor: pointer;
      min-width: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: pointer;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 12px 0;
    }

    /* ── ツールチップ（body直下・position:fixed） ── */
    #tooltip {
      position: fixed;
      z-index: 1000;
      background: rgba(10, 10, 16, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      padding: 10px 13px;
      font-family: 'Poppins', sans-serif;
      font-size: 10px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.78);
      width: 190px;
      line-height: 1.65;
      letter-spacing: 0.025em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.16s ease;
      white-space: normal;
    }

    /* ── パネルトグルボタン ──────────────────────────── */
    #panel-toggle {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 25;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(12, 12, 16, 0.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: rgba(255,255,255,0.8);
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.2s;
    }
    #panel-toggle:active { background: rgba(40,40,48,0.9); }

    /* ── モバイル（〜640px） ─────────────────────────── */
    @media (max-width: 640px) {
      #panel-toggle { display: flex; }

      #panel {
        top: auto;
        left: 12px;
        right: 12px;
        bottom: 80px;
        min-width: 0;
        max-height: 60vh;
        overflow-y: auto;
      }

      #panel { opacity: 0; transform: translateY(8px) scale(0.97); pointer-events: none; }
      #panel.open { opacity: 1; transform: none; pointer-events: auto; }
      #panel.hidden { opacity: 0; transform: translateY(8px) scale(0.97); pointer-events: none; }

      .meta { display: none; }
      .meta-left { display: none; }
      #fps { display: none; }
    }

    /* ── タブレット ──────────────────────────────────── */
    @media (min-width: 641px) and (max-width: 1024px) {
      #panel { top: 16px; left: 16px; }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-B8mxle7U.js"></script>
</head>
<body>
  <div id="bg-text">
    <div class="main-title">GLASS<br>MATERIAL</div>
  </div>

  <a class="meta" href="../index.html">SKETCH 001<br>2026</a>
  <div class="meta-left">WEBGL · THREE.JS<br>GLASS BLOB</div>
  <div id="fps">-- fps</div>

  <div id="panel">
    <div id="panel-head">
      <h3>Parameters</h3>
      <button id="panel-toggle-btn">−</button>
    </div>

    <div id="panel-body">
    <div class="param-row">
      <span class="param-label">ior</span>
      <span class="info-btn" data-tip="屈折率。光がガラス面で曲がる強さを表します。大きいほど歪みが強くなります。（水：1.33 / ガラス：約1.5）">i</span>
      <input type="range" id="p-ior" min="1.0" max="2.4" step="0.01" value="1.35">
      <span class="param-val" id="v-ior">1.35</span>
    </div>
    <div class="param-row">
      <span class="param-label">thickness</span>
      <span class="info-btn" data-tip="ガラスの厚さ。大きいほど背景がずれて見え、歪みが増します。">i</span>
      <input type="range" id="p-thickness" min="0" max="1.0" step="0.01" value="0.20">
      <span class="param-val" id="v-thickness">0.20</span>
    </div>
    <div class="param-row">
      <span class="param-label">chromaticAb.</span>
      <span class="info-btn" data-tip="色収差。光の波長によって屈折がずれる量。大きいほどエッジに虹色の縁取りが強く出ます。">i</span>
      <input type="range" id="p-aberration" min="0" max="0.08" step="0.001" value="0.018">
      <span class="param-val" id="v-aberration">0.018</span>
    </div>

    <div class="divider"></div>

    <div class="param-row">
      <span class="param-label">noise str.</span>
      <span class="info-btn" data-tip="ブロブの変形の強さ。0で球体に近い形、大きいほど有機的にうねります。">i</span>
      <input type="range" id="p-noise-str" min="0" max="0.6" step="0.01" value="0.6">
      <span class="param-val" id="v-noise-str">0.60</span>
    </div>
    <div class="param-row">
      <span class="param-label">noise freq.</span>
      <span class="info-btn" data-tip="変形パターンの細かさ。大きいほど小さな凹凸が増えます。">i</span>
      <input type="range" id="p-noise-freq" min="0.2" max="2.0" step="0.05" value="0.2">
      <span class="param-val" id="v-noise-freq">0.20</span>
    </div>
    <div class="param-row">
      <span class="param-label">noise speed</span>
      <span class="info-btn" data-tip="変形アニメーションの速さ。0にすると動きが止まります。">i</span>
      <input type="range" id="p-noise-spd" min="0" max="0.03" step="0.001" value="0.008">
      <span class="param-val" id="v-noise-spd">0.008</span>
    </div>

    <div class="divider"></div>

    <div class="param-row">
      <span class="param-label">env intensity</span>
      <span class="info-btn" data-tip="環境マップの反射強度。大きいほどガラス面に周囲の環境が強く映り込みます。0で反射なし。">i</span>
      <input type="range" id="p-env-int" min="0" max="1.5" step="0.01" value="0.85">
      <span class="param-val" id="v-env-int">0.85</span>
    </div>
    </div>
  </div>

  <!-- ツールチップ（body直下でfixedにすることでoverflowクリップを回避） -->
  <div id="tooltip"></div>

  <!-- モバイル用トグルボタン -->
  <button id="panel-toggle" aria-label="Toggle parameters">⚙</button>

  <canvas id="webgl"></canvas>

  <script>
    // ── ツールチップ制御 ────────────────────────────────────────
    const tooltip = document.getElementById('tooltip');
    let hideTimer = null;

    document.querySelectorAll('.info-btn').forEach(btn => {
      btn.addEventListener('mouseenter', () => {
        clearTimeout(hideTimer);
        const rect = btn.getBoundingClientRect();
        tooltip.textContent = btn.dataset.tip;

        // いったん表示してサイズを取得
        tooltip.style.opacity = '0';
        tooltip.style.display = 'block';
        const tw = tooltip.offsetWidth;
        const th = tooltip.offsetHeight;

        // 右に表示。はみ出す場合は左に
        let left = rect.right + 10;
        if (left + tw > window.innerWidth - 8) {
          left = rect.left - tw - 10;
        }
        // 上下中央揃え。はみ出す場合は調整
        let top = rect.top + rect.height / 2 - th / 2;
        top = Math.max(8, Math.min(top, window.innerHeight - th - 8));

        tooltip.style.left = left + 'px';
        tooltip.style.top  = top  + 'px';
        tooltip.style.opacity = '1';
      });

      btn.addEventListener('mouseleave', () => {
        hideTimer = setTimeout(() => {
          tooltip.style.opacity = '0';
        }, 120);
      });
    });

    // ── パネル折りたたみ ──
    (function () {
      const head = document.getElementById('panel-head');
      const body = document.getElementById('panel-body');
      const btn  = document.getElementById('panel-toggle-btn');
      let open = true;

      head.addEventListener('click', () => {
        open = !open;
        body.style.display = open ? '' : 'none';
        btn.textContent = open ? '−' : '+';
      });
    }());
  </script>

</body>
</html>
