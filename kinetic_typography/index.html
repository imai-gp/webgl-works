<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobius Ring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #d4d4d4; overflow: hidden; }
    canvas { display: block; }

    /* ── 右上メタ ──────────────────────────────────────────── */
    .meta {
      position: fixed;
      top: 24px;
      right: 20px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 10px;
      color: #000;
      letter-spacing: 0.12em;
      line-height: 1.8;
      text-align: right;
      user-select: none;
      pointer-events: none;
      z-index: 1;
    }

    /* ── 左下メタ ──────────────────────────────────────────── */
    .meta-left {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 10px;
      color: #000;
      letter-spacing: 0.12em;
      line-height: 1.8;
      user-select: none;
      pointer-events: none;
      z-index: 1;
    }

    /* ── パラメーターパネル ──────────────────────────────────── */
    #panel {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(255, 255, 255, 0.80);
      border: 1px solid rgba(0, 0, 0, 0.10);
      border-radius: 10px;
      padding: 16px 18px;
      min-width: 220px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-family: 'Poppins', sans-serif;
      color: rgba(0, 0, 0, 0.55);
      font-size: 11px;
      letter-spacing: 0.05em;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    #panel h3 {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: rgba(0, 0, 0, 0.30);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .param-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 11px;
    }
    .param-row:last-child { margin-bottom: 0; }

    .param-label {
      flex: 0 0 80px;
      white-space: nowrap;
      color: rgba(0, 0, 0, 0.60);
    }

    .info-btn {
      flex: 0 0 auto;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.22);
      background: transparent;
      color: rgba(0, 0, 0, 0.30);
      font-family: 'Poppins', sans-serif;
      font-size: 8px;
      font-weight: 700;
      font-style: italic;
      cursor: default;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: border-color 0.18s, color 0.18s;
      user-select: none;
    }
    .info-btn:hover {
      border-color: rgba(0, 0, 0, 0.55);
      color: rgba(0, 0, 0, 0.70);
    }

    .param-val {
      flex: 0 0 36px;
      text-align: right;
      color: rgba(0, 0, 0, 0.90);
      font-weight: 700;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 2px;
      background: rgba(0, 0, 0, 0.15);
      outline: none;
      cursor: pointer;
      min-width: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #000;
      border: none;
      cursor: pointer;
    }

    .divider {
      height: 1px;
      background: rgba(0, 0, 0, 0.07);
      margin: 12px 0;
    }

    /* ── ツールチップ ────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 8px;
      padding: 10px 13px;
      font-family: 'Poppins', sans-serif;
      font-size: 10px;
      font-weight: 400;
      color: rgba(0, 0, 0, 0.78);
      width: 190px;
      line-height: 1.65;
      letter-spacing: 0.025em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.16s ease;
      white-space: normal;
    }

    /* ── モバイル ────────────────────────────────────────────── */
    #panel-toggle {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 25;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.15);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: rgba(0,0,0,0.8);
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.2s;
    }

    @media (max-width: 640px) {
      #panel-toggle { display: flex; }
      #panel {
        top: auto; left: 12px; right: 12px;
        bottom: 80px; min-width: 0;
        max-height: 60vh; overflow-y: auto;
        opacity: 0; transform: translateY(8px) scale(0.97); pointer-events: none;
      }
      #panel.open { opacity: 1; transform: none; pointer-events: auto; }
      .meta, .meta-left { display: none; }
    }
    @media (min-width: 641px) and (max-width: 1024px) {
      #panel { top: 16px; left: 16px; }
    }
  </style>
</head>
<body>
  <div class="meta">COLLECTION 002<br>2026</div>
  <div class="meta-left">WEBGL・THREE.JS<br>MOBIUS RING</div>

  <div id="panel">
    <h3>Parameters</h3>

    <div class="param-row">
      <span class="param-label">twist speed</span>
      <span class="info-btn" data-tip="ねじりアニメーションの速さ。大きいほどテクスチャのねじれが速く流れます。0で静止。">i</span>
      <input type="range" id="p-twist" min="0" max="0.02" step="0.001" value="0.008">
      <span class="param-val" id="v-twist">0.008</span>
    </div>
    <div class="param-row">
      <span class="param-label">rotation</span>
      <span class="info-btn" data-tip="リングの自動回転速度。0で回転が止まります。ドラッグ中は自動停止。">i</span>
      <input type="range" id="p-rot" min="0" max="0.01" step="0.0002" value="0.002">
      <span class="param-val" id="v-rot">0.002</span>
    </div>

    <div class="divider"></div>

    <div class="param-row">
      <span class="param-label">tube size</span>
      <span class="info-btn" data-tip="チューブ断面の大きさ。大きいほど太い正方形チューブになります。">i</span>
      <input type="range" id="p-tube" min="0.3" max="1.2" step="0.01" value="0.75">
      <span class="param-val" id="v-tube">0.75</span>
    </div>
    <div class="param-row">
      <span class="param-label">scroll speed</span>
      <span class="info-btn" data-tip="テキストがリング面を流れる速さ。0で文字が静止します。">i</span>
      <input type="range" id="p-scroll" min="0" max="0.005" step="0.0001" value="0.001">
      <span class="param-val" id="v-scroll">0.001</span>
    </div>
  </div>

  <div id="tooltip"></div>
  <button id="panel-toggle" aria-label="Toggle parameters">⚙</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  'use strict';

  // ── アニメーション設定（スライダーで変更される） ──────────────────
  let twistSpeed  = 0.008;
  let rotSpeed    = 0.002;
  let tubeSize    = 0.75;
  let scrollSpeed = 0.001;

  // ── Scene / Camera / Renderer ─────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xd4d4d4);

  const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0, 9, 0);
  camera.up.set(0, 0, -1);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // ── 面共通テクスチャ ──────────────────────────────────────────────
  function createFaceTexture() {
    const W = 512, H = 256;
    const cv = document.createElement('canvas');
    cv.width = W; cv.height = H;
    const ctx = cv.getContext('2d');

    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);
    ctx.font         = "bold 100px 'Arial Black', sans-serif";
    ctx.fillStyle    = '#ffffff';
    ctx.textAlign    = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('MOBIUS   TWISTED   RING   ', 0, 80);
    ctx.fillText('TWISTED   RING   MOBIUS   ', 0, 200);

    const tex = new THREE.CanvasTexture(cv);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(7, 1);
    return tex;
  }

  const baseTex = createFaceTexture();
  const materials = [0, 80, 160, 240].map(px => {
    const tex       = baseTex.clone();
    tex.offset.x    = px / 512;
    tex.needsUpdate = true;
    return new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
  });

  // ── ジオメトリ ────────────────────────────────────────────────────
  const TUBE_SEGS    = 200;
  const R            = 2.2;
  const VERTS_PER_FACE = (TUBE_SEGS + 1) * 2;
  const numVerts     = 4 * VERTS_PER_FACE;
  const positions    = new Float32Array(numVerts * 3);
  const uvs          = new Float32Array(numVerts * 2);

  for (let j = 0; j < 4; j++) {
    for (let i = 0; i <= TUBE_SEGS; i++) {
      const u = i / TUBE_SEGS;
      for (let k = 0; k < 2; k++) {
        const base    = (j * VERTS_PER_FACE + i * 2 + k) * 2;
        uvs[base]     = u;
        uvs[base + 1] = k;
      }
    }
  }

  const TRIS_PER_FACE = TUBE_SEGS * 6;
  const idxArr        = new Uint32Array(4 * TRIS_PER_FACE);
  let ip = 0;
  for (let j = 0; j < 4; j++) {
    const base = j * VERTS_PER_FACE;
    for (let i = 0; i < TUBE_SEGS; i++) {
      const BL = base + i * 2 + 0, TL = base + i * 2 + 1;
      const BR = base + (i + 1) * 2 + 0, TR = base + (i + 1) * 2 + 1;
      idxArr[ip++] = BL; idxArr[ip++] = BR; idxArr[ip++] = TR;
      idxArr[ip++] = BL; idxArr[ip++] = TR; idxArr[ip++] = TL;
    }
  }

  const geometry = new THREE.BufferGeometry();
  const posAttr  = new THREE.BufferAttribute(positions, 3);
  geometry.setAttribute('position', posAttr);
  geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  geometry.setIndex(new THREE.BufferAttribute(idxArr, 1));
  for (let j = 0; j < 4; j++) geometry.addGroup(j * TRIS_PER_FACE, TRIS_PER_FACE, j);

  function updatePositions(phaseOffset) {
    const s = tubeSize;
    const corners = [[-s,-s],[s,-s],[s,s],[-s,s]];

    for (let i = 0; i <= TUBE_SEGS; i++) {
      const t          = (i / TUBE_SEGS) * Math.PI * 2;
      const twistAngle = (i / TUBE_SEGS) * Math.PI * 2 + phaseOffset;
      const cosT = Math.cos(t), sinT = Math.sin(t);
      const cx = R * cosT, cz = R * sinT;
      const nx = -cosT, ny = 0, nz = -sinT;
      const cosA = Math.cos(twistAngle), sinA = Math.sin(twistAngle);
      // twistedNormal   = normal*cos + binormal(0,1,0)*sin
      // twistedBinormal = -normal*sin + binormal(0,1,0)*cos
      const tnx = nx*cosA, tny = sinA,  tnz = nz*cosA;
      const tbx = -nx*sinA, tby = cosA, tbz = -nz*sinA;

      for (let j = 0; j < 4; j++) {
        const jn = (j + 1) % 4;
        const [lx0, ly0] = corners[j];
        const i0 = (j * VERTS_PER_FACE + i * 2 + 0) * 3;
        positions[i0]     = cx + lx0*tnx + ly0*tbx;
        positions[i0 + 1] =      lx0*tny + ly0*tby;
        positions[i0 + 2] = cz + lx0*tnz + ly0*tbz;

        const [lx1, ly1] = corners[jn];
        const i1 = (j * VERTS_PER_FACE + i * 2 + 1) * 3;
        positions[i1]     = cx + lx1*tnx + ly1*tbx;
        positions[i1 + 1] =      lx1*tny + ly1*tby;
        positions[i1 + 2] = cz + lx1*tnz + ly1*tbz;
      }
    }
    posAttr.needsUpdate = true;
  }

  const mesh = new THREE.Mesh(geometry, materials);
  mesh.rotation.x = 0;
  scene.add(mesh);

  // ── ドラッグ回転 ──────────────────────────────────────────────────
  let isDragging = false, prevMouse = { x: 0, y: 0 };

  renderer.domElement.addEventListener('mousedown', e => {
    isDragging = true; prevMouse = { x: e.clientX, y: e.clientY };
  });
  renderer.domElement.addEventListener('mousemove', e => {
    if (!isDragging) return;
    mesh.rotation.y += (e.clientX - prevMouse.x) * 0.008;
    mesh.rotation.x += (e.clientY - prevMouse.y) * 0.008;
    prevMouse = { x: e.clientX, y: e.clientY };
  });
  renderer.domElement.addEventListener('mouseup',    () => { isDragging = false; });
  renderer.domElement.addEventListener('mouseleave', () => { isDragging = false; });
  renderer.domElement.addEventListener('touchstart', e => {
    isDragging = true; prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  renderer.domElement.addEventListener('touchmove', e => {
    if (!isDragging) return;
    mesh.rotation.y += (e.touches[0].clientX - prevMouse.x) * 0.008;
    mesh.rotation.x += (e.touches[0].clientY - prevMouse.y) * 0.008;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  renderer.domElement.addEventListener('touchend', () => { isDragging = false; });
  renderer.domElement.addEventListener('wheel', e => {
    e.preventDefault();
    const dist = camera.position.length() * (e.deltaY > 0 ? 1.08 : 0.92);
    camera.position.setLength(Math.max(3, Math.min(20, dist)));
  }, { passive: false });

  // ── アニメーション ────────────────────────────────────────────────
  let phaseOffset = 0;

  function animate() {
    requestAnimationFrame(animate);
    phaseOffset += twistSpeed;
    updatePositions(phaseOffset);
    materials.forEach(mat => { mat.map.offset.x -= scrollSpeed; });
    if (!isDragging) mesh.rotation.y += rotSpeed;
    renderer.render(scene, camera);
  }

  animate();

  // ── スライダー連動 ────────────────────────────────────────────────
  function bindSlider(id, valId, setter, digits) {
    const el = document.getElementById(id);
    const vl = document.getElementById(valId);
    el.addEventListener('input', () => {
      const v = parseFloat(el.value);
      setter(v);
      vl.textContent = v.toFixed(digits);
    });
  }
  bindSlider('p-twist',  'v-twist',  v => { twistSpeed  = v; }, 3);
  bindSlider('p-rot',    'v-rot',    v => { rotSpeed     = v; }, 4);
  bindSlider('p-tube',   'v-tube',   v => { tubeSize     = v; }, 2);
  bindSlider('p-scroll', 'v-scroll', v => { scrollSpeed  = v; }, 4);

  // ── リサイズ ──────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}());

// ── ツールチップ ──────────────────────────────────────────────────
(function () {
  const tooltip = document.getElementById('tooltip');
  let hideTimer = null;

  document.querySelectorAll('.info-btn').forEach(btn => {
    btn.addEventListener('mouseenter', () => {
      clearTimeout(hideTimer);
      tooltip.textContent = btn.dataset.tip;
      tooltip.style.opacity = '0';
      tooltip.style.display = 'block';
      const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
      const rect = btn.getBoundingClientRect();
      let left = rect.right + 10;
      if (left + tw > window.innerWidth - 8) left = rect.left - tw - 10;
      let top = rect.top + rect.height / 2 - th / 2;
      top = Math.max(8, Math.min(top, window.innerHeight - th - 8));
      tooltip.style.left = left + 'px';
      tooltip.style.top  = top  + 'px';
      tooltip.style.opacity = '1';
    });
    btn.addEventListener('mouseleave', () => {
      hideTimer = setTimeout(() => { tooltip.style.opacity = '0'; }, 120);
    });
  });

  // モバイルトグル
  const toggle = document.getElementById('panel-toggle');
  const panel  = document.getElementById('panel');
  if (toggle) toggle.addEventListener('click', () => panel.classList.toggle('open'));
}());
</script>
</body>
</html>
